<h2>Pantalla de Proveedores</h2>
<p>Total de proveedores: {{ proveedores.length }}</p>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Empresa</th>
      <th>Producto</th>
      <th>Teléfono</th>
    </tr>
  </thead>
  <tbody>
    <!-- @for recorre el arreglo del .ts y crea una fila por cada proveedor -->
    @for (proveedor of proveedores; track proveedor.id) {
      <tr>
        <td>{{ proveedor.id }}</td>
        <td>{{ proveedor.empresa }}</td>
        <td>{{ proveedor.producto }}</td>
        <td>{{ proveedor.telefono }}</td>
      </tr>
    }
  </tbody>
</table>

<a routerLink="/dashboard">Volver al dashboard</a>
